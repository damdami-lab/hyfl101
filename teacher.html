<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1-1 담임 페이지 🔐</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Gowun+Dodum&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #2d6a4f;
      --primary-light: #52b788;
      --primary-pale: #d8f3dc;
      --accent: #f4a261;
      --bg: #f8fdf9;
      --card: #ffffff;
      --text: #1b3a2d;
      --text-muted: #6b9080;
      --border: #b7e4c7;
      --shadow: 0 4px 24px rgba(45,106,79,0.10);
      --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
      border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 64px;
    }
    .nav-logo { font-family: 'Gowun Dodum', sans-serif; font-size: 1.2rem; color: var(--primary); font-weight: 700; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-tab { background: none; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 0.9rem; color: var(--text-muted); padding: 8px 16px; border-radius: 30px; transition: all 0.2s; }
    .nav-tab.active { background: var(--primary-pale); color: var(--primary); font-weight: 700; }
    .logout-btn { background: none; border: 1.5px solid var(--border); border-radius: 30px; padding: 7px 16px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.85rem; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
    .logout-btn:hover { background: #fff0f0; border-color: #e63946; color: #e63946; }

    /* ── LOGIN ── */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .login-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow); text-align: center; }
    .login-icon { font-size: 3rem; margin-bottom: 16px; }
    .login-card h2 { font-size: 1.4rem; font-weight: 900; color: var(--primary); margin-bottom: 6px; }
    .login-card p { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 28px; }
    .pw-input { width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 16px; font-family: 'Noto Sans KR', sans-serif; font-size: 1rem; background: var(--bg); color: var(--text); outline: none; text-align: center; letter-spacing: 4px; transition: border-color 0.2s; margin-bottom: 14px; }
    .pw-input:focus { border-color: var(--primary-light); }
    .pw-input.error { border-color: #e63946; animation: shake 0.3s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .login-btn { width: 100%; background: var(--primary); color: white; border: none; border-radius: 12px; padding: 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .login-btn:hover { background: #1b4332; transform: translateY(-2px); }
    .login-error { color: #e63946; font-size: 0.85rem; margin-top: 10px; min-height: 20px; }

    /* ── MAIN ── */
    .main { display: none; padding-top: 64px; height: 100vh; }
    .main.visible { display: flex; }

    /* 사이드바 — dashboard 탭에서만 보임 */
    .sidebar { width: 220px; flex-shrink: 0; background: var(--card); border-right: 1.5px solid var(--border); height: calc(100vh - 64px); position: sticky; top: 64px; overflow-y: auto; display: none; flex-direction: column; }
    .sidebar.visible { display: flex; }
    .sidebar-title { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); padding: 20px 16px 8px; letter-spacing: 0.05em; }
    .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer; transition: all 0.15s; border-left: 3px solid transparent; font-size: 0.9rem; }
    .sidebar-item:hover { background: var(--primary-pale); }
    .sidebar-item.active { background: var(--primary-pale); border-left-color: var(--primary); font-weight: 700; color: var(--primary); }
    .sidebar-item .si-num { font-size: 0.72rem; color: var(--text-muted); }
    .sidebar-item .si-name { font-weight: 600; }
    .sidebar-item.active .si-name { color: var(--primary); }
    .sidebar-item .si-role { font-size: 0.68rem; color: var(--primary-light); }

    /* 콘텐츠 영역 — 항상 나머지 너비 전부 */
    .content-area { flex: 1; min-width: 0; overflow-y: auto; height: calc(100vh - 64px); }

    /* 각 페이지 탭 */
    .page-content { display: none; }
    .page-content.active { display: block; }
    #page-dashboard { padding: 0; }
    .page-fullwrap { padding: 32px 40px 60px; max-width: 960px; margin: 0 auto; }
    .section-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .section-top h3 { font-size: 1.1rem; font-weight: 700; color: var(--primary); }
    .count-badge { font-size: 0.85rem; color: var(--text-muted); font-weight: 400; margin-left: 8px; }
    .refresh-btn { background: none; border: 1.5px solid var(--border); border-radius: 30px; padding: 7px 16px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.85rem; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
    .refresh-btn:hover { background: var(--primary-pale); border-color: var(--primary-light); color: var(--primary); }
    .loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 60px; color: var(--text-muted); }
    .spinner { width: 22px; height: 22px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty .empty-icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── 설문 카드 ── */
    .survey-grid { display: flex; flex-direction: column; gap: 14px; }
    .survey-item { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 22px 24px; box-shadow: var(--shadow); }
    .survey-item-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
    .sv-name { font-weight: 900; font-size: 1rem; }
    .sv-mood { font-size: 1.3rem; }
    .sv-mood-label { background: var(--primary-pale); color: var(--primary); border-radius: 20px; padding: 3px 12px; font-size: 0.78rem; font-weight: 700; }
    .sv-date { margin-left: auto; font-size: 0.78rem; color: var(--text-muted); }
    .sv-section { margin-bottom: 10px; }
    .sv-section-label { font-size: 0.78rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
    .sv-section-body { font-size: 0.9rem; color: var(--text); line-height: 1.6; background: var(--bg); border-radius: 10px; padding: 10px 14px; }
    .sv-empty-field { font-size: 0.85rem; color: var(--text-muted); font-style: italic; }

    /* ── 필터 바 ── */
    .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-input { border: 1.5px solid var(--border); border-radius: 30px; padding: 8px 18px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem; outline: none; background: var(--card); color: var(--text); transition: border-color 0.2s; }
    .filter-input:focus { border-color: var(--primary-light); }
    .filter-select { border: 1.5px solid var(--border); border-radius: 30px; padding: 8px 16px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem; outline: none; background: var(--card); color: var(--text); cursor: pointer; }

    /* ── 상담 테이블 ── */
    .table-wrap { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .data-table th { background: var(--primary); color: white; padding: 14px 16px; text-align: left; font-size: 0.88rem; font-weight: 700; }
    .data-table td { padding: 14px 16px; border-bottom: 1px solid var(--primary-pale); font-size: 0.88rem; vertical-align: top; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--primary-pale); }
    .data-table .content-cell { max-width: 240px; color: var(--text-muted); font-size: 0.82rem; line-height: 1.5; }
    .badge { display: inline-block; background: var(--primary-pale); color: var(--primary); border-radius: 20px; padding: 3px 10px; font-size: 0.75rem; font-weight: 700; white-space: nowrap; }

    /* ── 통계 카드 ── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 32px; }
    .stat-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 22px; text-align: center; box-shadow: var(--shadow); }
    .stat-card .stat-num { font-size: 2.2rem; font-weight: 900; color: var(--primary); line-height: 1; }
    .stat-card .stat-label { font-size: 0.82rem; color: var(--text-muted); margin-top: 6px; }
    .stat-card .stat-icon { font-size: 1.5rem; margin-bottom: 8px; }
    .mood-bar { display: flex; flex-direction: column; gap: 8px; }
    .mood-row { display: flex; align-items: center; gap: 10px; }
    .mood-row .mood-em { font-size: 1.2rem; width: 28px; }
    .mood-row .mood-name { font-size: 0.82rem; color: var(--text-muted); width: 40px; }
    .mood-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .mood-fill { height: 100%; background: var(--primary-light); border-radius: 4px; transition: width 0.5s ease; }
    .mood-cnt { font-size: 0.78rem; color: var(--text-muted); width: 24px; text-align: right; }

    /* ── 학생 대시보드 인라인 패널 ── */
    .dash-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: var(--text-muted); gap: 12px; }
    .dash-placeholder .ph-icon { font-size: 3rem; }
    .dash-placeholder p { font-size: 0.9rem; }
    .dash-section-title { font-size: 0.85rem; font-weight: 700; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .dash-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .dash-empty { font-size: 0.85rem; color: var(--text-muted); padding: 12px; }
    .dash-counsel-item { background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 14px; margin-bottom: 8px; }
    .dash-counsel-item .dci-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .dash-counsel-item .dci-date { font-size: 0.8rem; font-weight: 700; color: var(--primary); }
    .dash-counsel-item .dci-time { font-size: 0.8rem; color: var(--text-muted); }
    .dash-counsel-item .dci-content { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; }
    .dash-suggest-item { background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 14px; margin-bottom: 8px; }
    .dash-suggest-item .dsi-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .dash-suggest-item .dsi-type { background: #fff3e0; color: #e76f51; border-radius: 20px; padding: 2px 10px; font-size: 0.72rem; font-weight: 700; }
    .dash-suggest-item .dsi-date { font-size: 0.75rem; color: var(--text-muted); margin-left: auto; }
    .dash-suggest-item .dsi-content { font-size: 0.85rem; color: var(--text); line-height: 1.6; }
    .dash-memo-area { width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem; line-height: 1.7; resize: vertical; min-height: 100px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
    .dash-memo-area:focus { border-color: var(--primary-light); }
    .dash-save-btn { background: var(--primary); color: white; border: none; border-radius: 30px; padding: 9px 22px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .dash-save-btn:hover { background: #1b4332; }
    .dash-reset-pw-btn { background: none; border: 1.5px solid var(--border); border-radius: 20px; padding: 6px 16px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.8rem; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
    .dash-reset-pw-btn:hover { background: #fff3e0; border-color: #e76f51; color: #e76f51; }
    /* 대시보드 탭 */
    .dtab-row { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 28px; }
    .dtab-btn { background: none; border: none; border-bottom: 3px solid transparent; margin-bottom: -2px; padding: 10px 18px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .dtab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .dtab-btn:hover:not(.active) { color: var(--text); }
    .dtab-panel { display: none; }
    .dtab-panel.active { display: block; }
    /* 기본사항 */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .info-field { display: flex; flex-direction: column; gap: 6px; }
    .info-field label { font-size: 0.78rem; font-weight: 700; color: var(--text-muted); }
    .info-input { border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.9rem; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; width: 100%; }
    .info-input:focus { border-color: var(--primary-light); }
    .info-save-bar { display: flex; align-items: center; gap: 12px; margin-top: 20px; }
    /* 학업사항 */
    .grade-upload-area { border: 2px dashed var(--border); border-radius: 14px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg); margin-bottom: 20px; }
    .grade-upload-area:hover { border-color: var(--primary-light); background: var(--primary-pale); }
    .grade-imgs { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .grade-img-card { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 3/4; background: var(--border); cursor: pointer; }
    .grade-img-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; }
    .grade-img-card:hover img { transform: scale(1.03); }
    .grade-img-del { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.55); color: white; border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 0.75rem; cursor: pointer; display: none; align-items: center; justify-content: center; }
    .grade-img-card:hover .grade-img-del { display: flex; }
    /* 상담기록 */
    .counsel-note-item { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 18px 20px; position: relative; box-shadow: var(--shadow); margin-bottom: 10px; }
    .counsel-note-item .cn-date { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
    .counsel-note-item .cn-body { font-size: 0.9rem; line-height: 1.7; white-space: pre-wrap; }
    .counsel-note-item .cn-del { position: absolute; top: 12px; right: 14px; background: none; border: none; cursor: pointer; font-size: 0.82rem; color: var(--text-muted); opacity: 0.5; }
    .counsel-note-item .cn-del:hover { opacity: 1; color: #e63946; }
    .cn-first-badge { display: inline-block; background: var(--primary); color: white; border-radius: 20px; padding: 2px 10px; font-size: 0.72rem; font-weight: 700; margin-bottom: 10px; }
    .cn-category { margin-bottom: 10px; }
    .cn-category-label { font-size: 0.75rem; font-weight: 700; color: var(--primary); margin-bottom: 3px; }
    .cn-category-body { font-size: 0.88rem; line-height: 1.6; color: var(--text); background: var(--bg); border-radius: 8px; padding: 8px 12px; white-space: pre-wrap; }
    .first-counsel-form { background: var(--card); border: 1.5px solid var(--primary-light); border-radius: 14px; padding: 20px 22px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .first-counsel-form h4 { font-size: 0.95rem; font-weight: 700; color: var(--primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .fc-field { margin-bottom: 14px; }
    .fc-field label { font-size: 0.78rem; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 5px; }
    .fc-field textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 13px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem; line-height: 1.6; resize: vertical; min-height: 70px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
    .fc-field textarea:focus { border-color: var(--primary-light); }
    .note-write-box { background: var(--card); border: 1.5px solid var(--primary-light); border-radius: 14px; padding: 16px 18px; display: none; box-shadow: var(--shadow); margin-bottom: 16px; }
    .note-write-box.open { display: block; }
    .note-write-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--primary); color: white; border: none; border-radius: 30px; padding: 9px 20px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .note-write-btn:hover { background: #1b4332; }
    /* 생기부 */
    .activity-record { background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; font-size: 0.88rem; line-height: 1.6; }
    .activity-record .ar-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .activity-record .ar-type { background: var(--primary-pale); color: var(--primary); border-radius: 20px; padding: 2px 10px; font-size: 0.72rem; font-weight: 700; }
    .activity-record .ar-date { font-size: 0.75rem; color: var(--text-muted); }
    .ai-draft-box { background: #f0fdf4; border: 1.5px solid var(--primary-light); border-radius: 14px; padding: 18px 20px; margin-top: 16px; }
    .ai-draft-box .ai-label { font-size: 0.78rem; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
    .ai-draft-text { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem; line-height: 1.8; resize: vertical; min-height: 140px; background: white; color: var(--text); outline: none; }
    .ai-draft-text:focus { border-color: var(--primary-light); }
    .ai-btn { display: inline-flex; align-items: center; gap: 8px; background: #1a73e8; color: white; border: none; border-radius: 30px; padding: 9px 20px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .ai-btn:hover { background: #1558b0; }
    .ai-btn:disabled { opacity: 0.6; cursor: default; }
    .lightbox-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 400; display: none; align-items: center; justify-content: center; }
    .lightbox-overlay.open { display: flex; }
    .lightbox-overlay img { max-width: 90vw; max-height: 90vh; border-radius: 10px; object-fit: contain; }
    .lightbox-close { position: absolute; top: 20px; right: 24px; background: none; border: none; color: white; font-size: 2rem; cursor: pointer; }

    /* ── 학생 비밀번호 관리 ── */
    .student-pw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .student-pw-item { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); }
    .spw-info .spw-num { font-size: 0.75rem; color: var(--text-muted); }
    .spw-info .spw-name { font-size: 0.95rem; font-weight: 700; }
    .spw-reset-btn { background: none; border: 1.5px solid var(--border); border-radius: 20px; padding: 5px 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.75rem; cursor: pointer; color: var(--text-muted); transition: all 0.2s; white-space: nowrap; }
    .spw-reset-btn:hover { background: #fff3e0; border-color: #e76f51; color: #e76f51; }

    /* ── 자율활동 공지 ── */
    .act-notice-item { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 18px 20px; box-shadow: var(--shadow); margin-bottom: 10px; position: relative; }
    .act-notice-item .an-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .act-notice-item .an-title { font-size: 1rem; font-weight: 700; color: var(--text); }
    .act-notice-item .an-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .act-notice-item .an-content { font-size: 0.88rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 10px; white-space: pre-wrap; }
    .act-notice-item .an-files { display: flex; flex-direction: column; gap: 6px; }

    .suggest-list { display: flex; flex-direction: column; gap: 12px; }

    .sg-read-btn { margin-top: 10px; background: none; border: 1.5px solid var(--border); border-radius: 20px; padding: 4px 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
    .sg-read-btn:hover { background: var(--primary-pale); border-color: var(--primary-light); color: var(--primary); }

    /* ── 슬롯 관리 ── */
    .slot-form-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px 24px; box-shadow: var(--shadow); margin-bottom: 8px; }

    .smi-time { font-size: 1rem; font-weight: 900; }
    .smi-label { font-size: 0.82rem; color: var(--text-muted); }
    .smi-status-empty { background: var(--primary-pale); color: var(--primary); border-radius: 20px; padding: 3px 12px; font-size: 0.75rem; font-weight: 700; }
    .smi-status-booked { background: #ffeaea; color: #e63946; border-radius: 20px; padding: 3px 12px; font-size: 0.75rem; font-weight: 700; }
    .smi-booker { font-size: 0.88rem; font-weight: 700; margin-left: auto; }
    .smi-delete { background: none; border: 1.5px solid var(--border); border-radius: 20px; padding: 4px 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }

    .panel-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* 상담 신청 상세 */

    .counsel-detail-key { color: var(--text-muted); min-width: 72px; font-weight: 500; }
    .counsel-detail-val { color: var(--text); font-weight: 600; }

    /* 설문 이력 */
    .survey-history { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }

    .shi-date { font-size: 0.72rem; color: var(--text-muted); margin-left: auto; }
    .shi-text { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; }

    /* 상담 메모 */
    .memo-area { width: 100%; border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 16px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.9rem; line-height: 1.7; resize: vertical; min-height: 120px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
    .memo-area:focus { border-color: var(--primary-light); }
    .memo-save-btn { background: var(--primary); color: white; border: none; border-radius: 30px; padding: 10px 24px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .memo-save-btn:hover { background: #1b4332; }
    .memo-save-btn:disabled { opacity: 0.6; cursor: default; }
    .memo-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; }

    /* 클릭 가능한 테이블 행 */
    .data-table tbody tr { cursor: pointer; }
    .data-table tbody tr td:first-child { color: var(--primary); font-weight: 700; text-decoration: underline; text-decoration-style: dotted; }

    /* ── 토스트 ── */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1b3a2d; color: white; border-radius: 30px; padding: 12px 28px; font-size: 0.9rem; font-weight: 500; z-index: 300; transition: transform 0.3s; white-space: nowrap; }

<body>

<!-- ════════════ 로그인 화면 ════════════ -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h2>담임 전용 페이지</h2>
    <p>1학년 1반 담임선생님만 접근할 수 있어요</p>
    <input class="pw-input" type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()" />
    <button class="login-btn" onclick="login()">로그인</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ════════════ 메인 (로그인 후) ════════════ -->
<nav id="mainNav" style="display:none">
  <span class="nav-logo">🌱 1-1 담임 페이지</span>
  <div class="nav-right">
    <button class="nav-tab active" id="tab-dashboard" onclick="showTab('dashboard')">👥 학생 현황</button>
    <button class="nav-tab" id="tab-suggest" onclick="showTab('suggest')">💡 건의사항</button>
    <button class="nav-tab" id="tab-activity" onclick="showTab('activity')">🌱 자율활동 공지</button>
    <button class="nav-tab" id="tab-slots" onclick="showTab('slots')">🗓️ 상담 관리</button>
    <button class="nav-tab" id="tab-planner" onclick="showTab('planner')">📓 플래너</button>
    <button class="nav-tab" id="tab-stats" onclick="showTab('stats')">📊 통계</button>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
</nav>

<div class="main" id="mainContent">

  <!-- 왼쪽 명렬 사이드바 (dashboard 탭에서만 보임) -->
  <div class="sidebar" id="studentSidebar">
    <div class="sidebar-title">1학년 1반 · 24명</div>
  </div>

  <!-- 오른쪽 콘텐츠 전체 -->
  <div class="content-area" id="mainContentArea">

    <!-- 학생 현황 탭 -->
    <div class="page-content active" id="page-dashboard">
      <div id="dashContent">
        <div class="dash-placeholder">
          <div class="ph-icon">👈</div>
          <p>왼쪽 명렬에서 학생을 선택해주세요</p>
        </div>
      </div>
    </div>

    <!-- 건의사항 탭 -->
    <div class="page-content" id="page-suggest">
      <div class="page-fullwrap">
        <div class="section-top">
          <h3>💡 건의사항 <span class="count-badge" id="suggestCount"></span></h3>
          <button class="refresh-btn" onclick="loadSuggestions()">🔄 새로고침</button>
        </div>
        <div class="filter-bar">
          <select class="filter-select" id="sgTypeFilter" onchange="renderSuggestions()">
            <option value="">전체 유형</option>
            <option value="학급 규칙">📋 학급 규칙</option>
            <option value="환경 개선">🏫 환경 개선</option>
            <option value="행사/활동">🎉 행사/활동</option>
            <option value="선생님께">💬 선생님께</option>
            <option value="기타">✏️ 기타</option>
          </select>
          <select class="filter-select" id="sgReadFilter" onchange="renderSuggestions()">
            <option value="">전체</option>
            <option value="unread">읽지 않음</option>
            <option value="read">읽음</option>
          </select>
        </div>
        <div class="suggest-list" id="suggestList">
          <div class="loading"><div class="spinner"></div> 불러오는 중...</div>
        </div>
      </div>
    </div>

    <!-- 상담 관리 탭 -->
    <div class="page-content" id="page-slots">
      <div class="page-fullwrap">
        <h3 style="font-size:1rem;font-weight:700;color:var(--primary);margin-bottom:20px">🗓️ 상담 가능 시간 등록</h3>

          <div class="slot-form-row">
            <div class="slot-form-group"><label>날짜</label><input type="date" id="newSlotDate" class="slot-input" /></div>
            <div class="slot-form-group"><label>시간</label><input type="time" id="newSlotTime" class="slot-input" /></div>
            <div class="slot-form-group" style="flex:2"><label>메모 (선택)</label><input type="text" id="newSlotLabel" class="slot-input" placeholder="예: 점심시간, 방과 후 등" /></div>
            <button class="slot-add-btn" onclick="addSlot()">+ 추가</button>
          </div>
        </div>
        <div class="section-top" style="margin-top:28px;">
          <h3 style="font-size:1rem;font-weight:700;color:var(--primary)">등록된 상담 시간 <span class="count-badge" id="slotCount"></span></h3>
          <button class="refresh-btn" onclick="loadSlots()">🔄 새로고침</button>
        </div>
        <div id="slotManageList"><div class="loading"><div class="spinner"></div></div></div>
        <div class="section-top" style="margin-top:32px;">
          <h3 style="font-size:1rem;font-weight:700;color:var(--primary)">💬 상담 예약 현황 <span class="count-badge" id="counselCount"></span></h3>
          <button class="refresh-btn" onclick="loadCounsel()">🔄 새로고침</button>
        </div>
        <div class="filter-bar">
          <input class="filter-input" type="text" id="csSearch" placeholder="🔍 이름 검색..." oninput="renderCounsel()" />
          <select class="filter-select" id="csStatusFilter" onchange="renderCounsel()">
            <option value="">전체</option>
            <option value="booked">예약됨</option>
            <option value="empty">빈 슬롯</option>
          </select>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>날짜</th><th>시간</th><th>메모</th><th>예약자</th><th>상담 내용</th><th>관리</th></tr></thead>
            <tbody id="counselBody"><tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 자율활동 공지 탭 -->
    <div class="page-content" id="page-activity">
      <div class="page-fullwrap">
        <div class="section-top">
          <h3>🌱 자율활동 공지 관리</h3>
        </div>
        <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:24px">학생 페이지의 각 활동 탭 상단에 공지와 파일이 표시돼요.</p>

        <div style="display:flex;gap:8px;margin-bottom:24px;border-bottom:2px solid var(--border)">
          <button class="dtab-btn active" id="actNoticeTab-change" onclick="switchActNoticeTab('change')">🔥 체인지 메이커</button>
          <button class="dtab-btn" id="actNoticeTab-journal" onclick="switchActNoticeTab('journal')">📰 클래스 저널</button>
        </div>

        <!-- 공지 작성 폼 -->
        <div class="slot-form-card" style="margin-bottom:24px">
          <div style="display:flex;flex-direction:column;gap:12px">
            <div class="slot-form-group" style="flex:1">
              <label>공지 제목</label>
              <input type="text" id="actNoticeTitle" class="slot-input" placeholder="예: 1차 발표 자료 안내" />
            </div>
            <div class="slot-form-group" style="flex:1">
              <label>내용</label>
              <textarea id="actNoticeContent" class="slot-input" placeholder="학생들에게 전달할 내용을 입력해주세요" style="min-height:80px;resize:vertical"></textarea>
            </div>
            <div class="slot-form-group" style="flex:1">
              <label>파일 첨부 <span style="font-weight:400;color:var(--text-muted)">(선택 · PDF, 이미지, 문서 등)</span></label>
              <input type="file" id="actNoticeFile" class="slot-input" style="padding:8px" multiple />
            </div>
            <button class="slot-add-btn" style="align-self:flex-start" onclick="saveActNotice()">📢 공지 올리기</button>
          </div>
        </div>

        <!-- 등록된 공지 목록 -->
        <div class="section-top">
          <h3 style="font-size:1rem;font-weight:700;color:var(--primary)">등록된 공지 <span class="count-badge" id="actNoticeCount"></span></h3>
          <button class="refresh-btn" onclick="loadActNotices()">🔄 새로고침</button>
        </div>
        <div id="actNoticeList"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>
<!-- 플래너 탭 -->
<div class="page-content" id="page-planner">
  <div class="page-fullwrap">
    <div class="section-top">
      <h3>📓 플래너 현황</h3>
      <button class="refresh-btn" onclick="loadPlannerAdmin()">🔄 새로고침</button>
    </div>
    <!-- 날짜 선택 -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap">
      <button class="cal-nav" onclick="changePlannerAdminDate(-1)" style="width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;font-size:1rem">‹</button>
      <input type="date" id="plannerAdminDate" style="border:1.5px solid var(--border);border-radius:10px;padding:10px 16px;font-family:'Noto Sans KR',sans-serif;font-size:0.95rem;font-weight:700;outline:none;background:var(--card)" onchange="loadPlannerAdmin()" />
      <button class="cal-nav" onclick="changePlannerAdminDate(1)" style="width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;font-size:1rem">›</button>
      <button class="refresh-btn" onclick="setPlannerAdminToday()">오늘</button>
      <span id="plannerAdminSummary" style="font-size:0.85rem;color:var(--text-muted);margin-left:8px"></span>
    </div>
    <!-- 학생 목록 -->
    <div id="plannerAdminList">
      <div class="loading"><div class="spinner"></div> 불러오는 중...</div>
    </div>
  </div>

  function switchDtab(btn, tabId) {
    btn.closest('.dtab-row').querySelectorAll('.dtab-btn').forEach(b => b.classList.remove('active'));

    document.querySelectorAll('.dtab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
  }

  // ── 관찰 기록 ──
  function toggleObserveBox() {
    const box = document.getElementById('observeWriteBox');
    const btn = document.getElementById('observeToggleBtn');
    box.classList.toggle('open');
    if (box.classList.contains('open')) {
      document.getElementById('observeTitleInput').focus();
      btn.textContent = '✕ 닫기';
    } else {
      document.getElementById('observeTitleInput').value = '';
      document.getElementById('observeInput').value = '';
      btn.textContent = '✏️ 기록 추가';
    }
  }

  async function loadObserveRecords(num) {
    const el = document.getElementById('observeList');
    if (!el) return;
    const { data } = await sb.from('student_observations')
      .select('*').eq('student_num', num).order('created_at', { ascending: false });
    const records = data || [];
    if (!records.length) {
      el.innerHTML = '<div class="dash-empty" style="text-align:center;padding:32px">아직 관찰 기록이 없어요.<br/>✏️ 버튼으로 첫 기록을 남겨봐요!</div>';
      return;
    }
    el.innerHTML = records.map(r => {
      const dt = new Date(r.created_at);
      const dateStr = `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
      return `<div class="counsel-note-item">
        <div class="cn-date">🔍 ${dateStr}</div>
        ${r.title ? `<div style="font-size:1rem;font-weight:900;color:var(--text);margin-bottom:6px">${r.title}</div>` : ''}
        <div class="cn-body">${r.content}</div>
        <button class="cn-del" onclick="deleteObserve(${r.id})" title="삭제">✕</button>
      </div>`;
    }).join('');
  }

  async function saveObserve() {
    if (!dashStudent) return;
    const title = document.getElementById('observeTitleInput').value.trim();
    const content = document.getElementById('observeInput').value.trim();
    if (!content) { showToast('❗ 내용을 입력해주세요'); return; }
    const btn = document.querySelector('#observeWriteBox .dash-save-btn');
    btn.disabled = true; btn.textContent = '저장 중...';
    const { error } = await sb.from('student_observations').insert([{
      student_num: dashStudent.num,
      student_name: dashStudent.name,
      title: title || null,
      content
    }]);
    btn.disabled = false; btn.textContent = '💾 저장';
    if (error) { showToast('❗ 저장 실패: ' + error.message); return; }
    showToast('✅ 관찰 기록이 저장됐어요');
    toggleObserveBox();
    await loadObserveRecords(dashStudent.num);
  }

  async function deleteObserve(id) {
    if (!confirm('이 기록을 삭제할까요?')) return;
    await sb.from('student_observations').delete().eq('id', id);
    showToast('🗑️ 삭제됐어요');
    await loadObserveRecords(dashStudent.num);
  }

      <div class="info-field"><label>어머니 성함</label><input class="info-input" id="info_mom_name" value="${v.mom_name||''}" placeholder="홍어머니" /></div>
      <div class="info-field"><label>어머니 연락처</label><input class="info-input" id="info_mom_phone" value="${v.mom_phone||''}" placeholder="010-0000-0000" /></div>
      <div class="info-field"><label>아버지 성함</label><input class="info-input" id="info_dad_name" value="${v.dad_name||''}" placeholder="홍아버지" /></div>
      <div class="info-field"><label>아버지 연락처</label><input class="info-input" id="info_dad_phone" value="${v.dad_phone||''}" placeholder="010-0000-0000" /></div>
      <div class="info-field"><label>학생 연락처</label><input class="info-input" id="info_student_phone" value="${v.student_phone||''}" placeholder="010-0000-0000" /></div>
      <div class="info-field"><label>생년월일</label><input class="info-input" id="info_birth_date" type="date" value="${v.birth_date||''}" /></div>
      <div class="info-field"><label>출신 중학교</label><input class="info-input" id="info_middle_school" value="${v.middle_school||''}" placeholder="○○중학교" /></div>
      <div class="info-field"><label>MBTI</label><input class="info-input" id="info_mbti" value="${v.mbti||''}" placeholder="예: INFP" style="text-transform:uppercase" /></div>
      <div class="info-field" style="grid-column:1/-1"><label>특이사항 / 메모</label><textarea class="info-input dash-memo-area" id="info_memo" placeholder="알레르기, 건강 상태, 특이사항 등..." style="min-height:80px">${v.memo||''}</textarea></div>`;
  }

  async function saveBasicInfo() {
    if (!dashStudent) return;
    const payload = {
      student_num: dashStudent.num,
      student_name: dashStudent.name,
      mom_name: document.getElementById('info_mom_name').value.trim(),
      mom_phone: document.getElementById('info_mom_phone').value.trim(),
      dad_name: document.getElementById('info_dad_name').value.trim(),
      dad_phone: document.getElementById('info_dad_phone').value.trim(),
      student_phone: document.getElementById('info_student_phone').value.trim(),
      birth_date: document.getElementById('info_birth_date').value || null,
      middle_school: document.getElementById('info_middle_school').value.trim(),
      mbti: document.getElementById('info_mbti').value.trim().toUpperCase(),
      memo: document.getElementById('info_memo').value.trim()
    };
    const { error } = await sb.from('student_info').upsert(payload, { onConflict: 'student_num' });
    if (error) { showToast('❗ 저장 실패: ' + error.message); return; }
    document.getElementById('infoSaveMeta').textContent = `저장: ${new Date().toLocaleString('ko-KR')}`;
    showToast('✅ 기본사항 저장됨');
  }

  async function loadDashRoles(num) {
    const allRoles = await getRolesAll();
    const myRoles = allRoles.filter(r => r.student_num === num);
    document.getElementById('dashRoles').innerHTML = myRoles.length
      ? `<div style="display:flex;flex-wrap:wrap;gap:8px">`+myRoles.map(r=>
          `<span style="display:inline-flex;align-items:center;gap:6px;background:var(--primary-pale);border:1.5px solid var(--border);border-radius:12px;padding:8px 16px;font-size:0.9rem">
            ${r.icon||'🙋'} <strong style="color:var(--primary)">${r.role_name}</strong>
            <span style="font-size:0.72rem;color:var(--text-muted)">${r.semester}학기</span>
          </span>`).join('')+`</div>`
      : '<div class="dash-empty">없음</div>';
  }

  // ── 학업사항 ──
  async function loadGradeImages(num) {
    const el = document.getElementById('gradeImgs');
    const { data, error } = await sb.storage.from('grade-images').list(num + '/', { sortBy: { column: 'created_at', order: 'desc' } });
    if (error || !data || !data.filter(f=>f.name!=='.emptyFolderPlaceholder').length) {
      el.innerHTML = '<div class="dash-empty" style="text-align:center;padding:20px">아직 업로드된 자료가 없어요</div>'; return;
    }
    const files = data.filter(f => f.name !== '.emptyFolderPlaceholder');
    el.innerHTML = files.map(f => {
      const url = sb.storage.from('grade-images').getPublicUrl(num + '/' + f.name).data.publicUrl;
      return `<div class="grade-img-card" onclick="openGradeLightbox('${url}')">
        <img src="${url}" loading="lazy" />
        <button class="grade-img-del" onclick="deleteGradeImage('${num}','${f.name}',event)">✕</button>
      </div>`;
    }).join('');
  }

  async function uploadGradeImages(files) {
    if (!dashStudent || !files.length) return;
    showToast('📎 업로드 중...');
    for (const file of files) {
      const fileName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9가-힣._-]/g,'_');
      await sb.storage.from('grade-images').upload(dashStudent.num + '/' + fileName, file, { upsert: false });
    }
    showToast('✅ 업로드 완료!');
    await loadGradeImages(dashStudent.num);
  }

  function handleGradeDrop(e) {
    e.preventDefault();
    uploadGradeImages(e.dataTransfer.files);
  }

  async function deleteGradeImage(num, name, e) {
    e.stopPropagation();
    if (!confirm('이 자료를 삭제할까요?')) return;
    await sb.storage.from('grade-images').remove([num + '/' + name]);
    await loadGradeImages(num);
    showToast('🗑️ 삭제됐어요');
  }

  function openGradeLightbox(url) {
    document.getElementById('gradelightboxImg').src = url;
    document.getElementById('gradelightbox').classList.add('open');
  }

    { key: 'friends',  label: '👥 친구 관계' },
    { key: 'family',   label: '🏠 가족 관계' },
    { key: 'college',  label: '🎓 진학 관련' },

  async function loadCounselNotes(num) {
    const el = document.getElementById('noteList');
    const { data } = await sb.from('student_notes').select('*')
      .eq('student_num', num).order('created_at', { ascending: true });
    const notes = data || [];
    const isFirst = !notes.length;

    let html = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <span style="font-size:0.88rem;color:var(--text-muted)">

    // 작성 폼
    if (isFirst) {
      html += `
      <div class="note-write-box first-counsel-form" id="noteWriteBox">

        ${COUNSEL_CATEGORIES.map(c => `
        <div class="fc-field">
          <label>${c.label}</label>
          <textarea id="fc_${c.key}" placeholder="${c.label.replace(/^.*\s/,'')} 관련 내용 (없으면 비워두세요)"></textarea>
        </div>`).join('')}
        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="dash-save-btn" id="counselSaveBtn" onclick="saveFirstCounsel()">💾 저장</button>
          <button onclick="toggleNoteBox()" style="background:none;border:1.5px solid var(--border);border-radius:30px;padding:9px 18px;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;cursor:pointer;color:var(--text-muted)">취소</button>
        </div>
      </div>`;
    } else {
      html += `
      <div class="note-write-box" id="noteWriteBox">
        <input type="date" id="counselNoteDate" class="info-input" style="width:200px;margin-bottom:10px" />
        <textarea class="dash-memo-area" id="noteInput" placeholder="상담 내용을 기록해주세요..." style="min-height:120px;margin-bottom:12px"></textarea>
        <div style="display:flex;gap:10px">
          <button class="dash-save-btn" id="counselSaveBtn" onclick="saveNote()">💾 저장</button>
          <button onclick="toggleNoteBox()" style="background:none;border:1.5px solid var(--border);border-radius:30px;padding:9px 18px;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;cursor:pointer;color:var(--text-muted)">취소</button>
        </div>
      </div>`;
    }

    // 기록 목록
    if (!notes.length) {
      html += '<div class="dash-empty" style="text-align:center;padding:24px">아직 상담 기록이 없어요</div>';
    } else {
      html += notes.map((n, i) => {
        const dt = new Date(n.created_at);
        const dateStr = n.counsel_date || `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;

        if (n.is_first && n.categories) {
          let cats;
          try { cats = JSON.parse(n.categories); } catch { cats = {}; }
          const catHtml = COUNSEL_CATEGORIES.filter(c => cats[c.key])
            .map(c => `<div class="cn-category">
              <div class="cn-category-label">${c.label}</div>
              <div class="cn-category-body">${cats[c.key]}</div>
            </div>`).join('');
          return `<div class="counsel-note-item">
            <div class="cn-date">📅 ${dateStr} &nbsp;<span class="cn-first-badge">첫 상담</span></div>
            ${catHtml}

            <button class="cn-del" onclick="deleteNote(${n.id})" title="삭제">✕</button>
          </div>`;
        }
        return `<div class="counsel-note-item">
          <div class="cn-date">📅 ${dateStr} &nbsp;<span style="font-size:0.72rem;color:var(--text-muted)">${i+1}회차</span></div>
          <div class="cn-body">${n.content}</div>
          <button class="cn-del" onclick="deleteNote(${n.id})" title="삭제">✕</button>
        </div>`;
      }).join('');
    }

    el.innerHTML = html;
  }

  function toggleNoteBox() {
    const box = document.getElementById('noteWriteBox');
    const btn = document.getElementById('noteToggleBtn');
    if (!box || !btn) return;
    box.classList.toggle('open');
    if (box.classList.contains('open')) {
      document.getElementById('counselNoteDate').value = new Date().toISOString().slice(0,10);
      btn.textContent = '✕ 닫기';
    } else {
      btn.textContent = box.querySelector('#fc_friends') ? '✏️ 첫 상담 기록' : '✏️ 상담 추가';

  async function saveFirstCounsel() {
    if (!dashStudent) return;
    const counsel_date = document.getElementById('counselNoteDate').value;
    const cats = {};
    COUNSEL_CATEGORIES.forEach(c => {
      const v = document.getElementById('fc_' + c.key)?.value.trim();
      if (v) cats[c.key] = v;

    if (!Object.keys(cats).length) { showToast('❗ 최소 한 항목 이상 입력해주세요'); return; }

    const { error } = await sb.from('student_notes').insert([{
      student_num: dashStudent.num, student_name: dashStudent.name,
      content: '', categories: JSON.stringify(cats),
      is_first: true, counsel_date: counsel_date || null

  async function generateAiDraft() {
    const records = document.querySelectorAll('.activity-record');
    if (!records.length) { showToast('❗ 자율활동 기록이 없어요'); return; }
    const actText = Array.from(records).map(r => r.textContent.trim()).join('\n');
    const btn = document.querySelector('.ai-btn');
    btn.disabled = true; btn.textContent = '✨ 생성 중...';
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `다음은 고등학생의 학급 자율활동 기록입니다. 이를 바탕으로 학교생활기록부 자율활동 특기사항 문구를 작성해주세요. 학생 이름은 "${dashStudent.name}"입니다. 공식적이고 긍정적인 어투로, 구체적 활동 내용을 포함해서 200자 내외로 작성해주세요. 문구만 출력하세요.\n\n활동 기록:\n${actText}`
          }]
        })
      });
      const data = await res.json();
      const text = data.content?.[0]?.text || '';
      document.getElementById('aiDraftText').value = text;
      showToast('✨ AI 초안이 생성됐어요!');
    } catch(e) {
      showToast('❗ AI 생성 실패');
    }
    btn.disabled = false; btn.textContent = '✨ AI 초안 생성';
  }

  async function saveActNotice() {
    const title = document.getElementById('actNoticeTitle').value.trim();
    if (!title) { showToast('❗ 제목을 입력해주세요'); return; }
    const content = document.getElementById('actNoticeContent').value.trim();
    const fileInput = document.getElementById('actNoticeFile');
    const btn = document.querySelector('#page-activity .slot-add-btn');
    btn.disabled = true; btn.textContent = '올리는 중...';

    // 파일 업로드
    const fileUrls = [];
    for (const file of fileInput.files) {
      const ext = file.name.split('.').pop();
      const fname = `notices/${currentActNoticeTab}/${Date.now()}.${ext}`;
      const { data: up, error: upErr } = await sb.storage.from('activity-images').upload(fname, file, { upsert: false });
      if (!upErr) {
        const url = sb.storage.from('activity-images').getPublicUrl(fname).data.publicUrl;
        fileUrls.push({ name: file.name, url });
      }
    }

    const { error } = await sb.from('activity_notices').insert([{
      activity_type: currentActNoticeTab,
      title, content: content || null,
      file_urls: fileUrls.length ? JSON.stringify(fileUrls) : null
    }]);
    btn.disabled = false; btn.textContent = '📢 공지 올리기';
    if (error) { showToast('❗ 저장 실패: ' + error.message); return; }
    document.getElementById('actNoticeTitle').value = '';
    document.getElementById('actNoticeContent').value = '';
    fileInput.value = '';
    showToast('✅ 공지가 등록됐어요!');
    await loadActNotices();
  }

  // ── 건의사항 ──
  let allSuggestions = [];

  async function loadSuggestions() {
    document.getElementById('suggestList').innerHTML = '<div class="loading"><div class="spinner"></div> 불러오는 중...</div>';
    const { data, error } = await sb.from('suggestions').select('*').order('created_at', { ascending: false });
    if (error) { showToast('❗ 건의사항을 불러오지 못했어요'); return; }
    allSuggestions = data || [];
    renderSuggestions();
  }

  function renderSuggestions() {
    const typeF = document.getElementById('sgTypeFilter').value;
    const readF = document.getElementById('sgReadFilter').value;
    let filtered = allSuggestions.filter(s => {
      if (typeF && s.type !== typeF) return false;
      if (readF === 'unread' && s.is_read) return false;
      if (readF === 'read' && !s.is_read) return false;
      return true;
    });
    const unreadCnt = allSuggestions.filter(s => !s.is_read).length;
    document.getElementById('suggestCount').textContent = `(${filtered.length}건${unreadCnt > 0 ? ` · 읽지 않음 ${unreadCnt}` : ''})`;
    const list = document.getElementById('suggestList');
    if (!filtered.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>건의사항이 없어요</p></div>'; return;
    }
    list.innerHTML = filtered.map(s => {
      const date = s.created_at ? s.created_at.slice(0,16).replace('T',' ') : '';
      return `<div class="suggest-item ${s.is_read ? '' : 'unread'}" id="sg-${s.id}">
        <div class="suggest-item-top">
          ${!s.is_read ? '<span class="sg-unread-dot"></span>' : ''}
          <span class="sg-type">${s.type}</span>
          <span class="sg-name">${s.name}</span>
          <span class="sg-date">${date}</span>
        </div>
        <div class="sg-content">${s.content}</div>
        ${!s.is_read ? `<button class="sg-read-btn" onclick="markRead(${s.id})">✅ 읽음 표시</button>` : '<span style="font-size:0.75rem;color:var(--text-muted);margin-top:8px;display:block">✅ 확인함</span>'}
      </div>`;
    }).join('');
  }

  async function markRead(id) {
    const { error } = await sb.from('suggestions').update({ is_read: true }).eq('id', id);
    if (error) { showToast('❗ 오류: ' + error.message); return; }
    const item = allSuggestions.find(s => s.id === id);
    if (item) item.is_read = true;
    renderSuggestions();
  }

  async function addSlot() {
    const date = document.getElementById('newSlotDate').value;
    const time = document.getElementById('newSlotTime').value;
    const label = document.getElementById('newSlotLabel').value.trim();
    if (!date || !time) { showToast('❗ 날짜와 시간을 입력해주세요'); return; }
    const btn = document.querySelector('.slot-add-btn');
    btn.disabled = true;
    const { error } = await sb.from('counsel_slots').insert([{ slot_date: date, slot_time: time, label: label || null }]);
    btn.disabled = false;
    if (error) { showToast('❗ 추가 실패: ' + error.message); return; }
    document.getElementById('newSlotDate').value = '';
    document.getElementById('newSlotTime').value = '';
    document.getElementById('newSlotLabel').value = '';
    showToast('✅ 상담 시간이 등록됐어요!');
    await loadSlots();
  }

  async function deleteSlot(id, isBooked) {
    const msg = isBooked ? '이미 예약된 슬롯이에요. 정말 삭제(취소)할까요?' : '이 상담 시간을 삭제할까요?';
    if (!confirm(msg)) return;
    const { error } = await sb.from('counsel_slots').delete().eq('id', id);
    if (error) { showToast('❗ 삭제 실패: ' + error.message); return; }
    showToast('🗑️ 삭제됐어요');
    await loadSlots();
    await loadCounsel();
  }

  // ── 상담 예약 현황 ──
  async function loadCounsel() {
    document.getElementById('counselBody').innerHTML = '<tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr>';
    const { data, error } = await sb.from('counsel_slots').select('*').order('slot_date').order('slot_time');
    allCounsel = data || [];
    renderCounsel();
  }

  function renderCounsel() {
    const search = document.getElementById('csSearch').value.trim().toLowerCase();
    const statusF = document.getElementById('csStatusFilter').value;
    const dayNames = ['일','월','화','수','목','금','토'];
    let filtered = allCounsel.filter(s => {
      if (search && !(s.booked_by || '').toLowerCase().includes(search)) return false;
      if (statusF === 'booked' && !s.booked_by) return false;
      if (statusF === 'empty' && s.booked_by) return false;
      return true;
    });
    document.getElementById('counselCount').textContent = `(${filtered.length}개)`;
    const body = document.getElementById('counselBody');
    if (!filtered.length) {
      body.innerHTML = '<tr><td colspan="6"><div class="empty"><div class="empty-icon">📭</div><p>해당하는 내역이 없어요</p></div></td></tr>'; return;
    }
    body.innerHTML = filtered.map(s => {
      const d = new Date(s.slot_date + 'T00:00:00');
      const dateLabel = `${d.getMonth()+1}월 ${d.getDate()}일 (${dayNames[d.getDay()]})`;
      return `<tr ${s.booked_by ? `onclick="openPanel(${s.id})"` : ''} style="${s.booked_by ? 'cursor:pointer' : ''}">
        <td>${dateLabel}</td>
        <td><strong>${s.slot_time.slice(0,5)}</strong></td>
        <td>${s.label || '<span style="color:#ccc">—</span>'}</td>
        <td>${s.booked_by ? `<strong>${s.booked_by}</strong>` : '<span style="color:#aaa">미예약</span>'}</td>
        <td class="content-cell">${s.booked_content || '<span style="color:#ccc">없음</span>'}</td>
        <td><button class="smi-delete" onclick="event.stopPropagation(); deleteSlot(${s.id}, ${!!s.booked_by})">${s.booked_by ? '취소' : '삭제'}</button></td>
      </tr>`;
    }).join('');
  }

  // ── 학생 상세 패널 ──
  let currentCounselId = null;

  async function openPanel(slotId) {
    const s = allCounsel.find(x => x.id === slotId);
    if (!s || !s.booked_by) return;
    currentCounselId = slotId;
    const dayNames = ['일','월','화','수','목','금','토'];
    const d = new Date(s.slot_date + 'T00:00:00');
    const dateLabel = `${d.getMonth()+1}월 ${d.getDate()}일 (${dayNames[d.getDay()]}) ${s.slot_time.slice(0,5)}`;

    document.getElementById('panelName').textContent = s.booked_by;
    document.getElementById('panelSub').textContent = dateLabel;
    document.getElementById('panelCounselDetail').innerHTML = `
      <div class="counsel-detail-row"><span class="counsel-detail-key">날짜·시간</span><span class="counsel-detail-val">${dateLabel}</span></div>
      ${s.label ? `<div class="counsel-detail-row"><span class="counsel-detail-key">메모</span><span class="counsel-detail-val">${s.label}</span></div>` : ''}
      ${s.booked_content ? `<div class="counsel-detail-row"><span class="counsel-detail-key">학생 내용</span><span class="counsel-detail-val" style="white-space:pre-wrap">${s.booked_content}</span></div>` : ''}
    `;
    document.getElementById('panelMemo').value = '';
    document.getElementById('memoMeta').textContent = '';
    const { data: memo } = await sb.from('counsel_memos').select('*').eq('counsel_id', slotId).maybeSingle();
    if (memo) {
      document.getElementById('panelMemo').value = memo.memo || '';
      document.getElementById('memoMeta').textContent = memo.updated_at ? `마지막 저장: ${memo.updated_at.slice(0,16).replace('T',' ')}` : '';
    }
    document.getElementById('studentOverlay').classList.add('open');
    document.getElementById('studentPanel').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closePanel() {
    document.getElementById('studentOverlay').classList.remove('open');
    document.getElementById('studentPanel').classList.remove('open');
    document.body.style.overflow = '';
    currentCounselId = null;
  }

  async function saveMemo() {
    if (!currentCounselId) return;
    const memo = document.getElementById('panelMemo').value.trim();
    const btn = document.getElementById('memoSaveBtn');
    btn.disabled = true; btn.textContent = '저장 중...';
    const { error } = await sb.from('counsel_memos').upsert({ counsel_id: currentCounselId, memo, updated_at: new Date().toISOString() }, { onConflict: 'counsel_id' });
    btn.disabled = false; btn.textContent = '💾 저장';
    if (error) { showToast('❗ 저장 실패: ' + error.message); return; }
    document.getElementById('memoMeta').textContent = `마지막 저장: ${new Date().toISOString().slice(0,16).replace('T',' ')}`;
    showToast('✅ 저장됐어요');
  }

  // ── 통계 ──
  async function loadStats() {
    const [sgRes, slotRes] = await Promise.all([
      sb.from('suggestions').select('*'),
      sb.from('counsel_slots').select('*')
    ]);
    const suggestions = sgRes.data || [];
    const slots = slotRes.data || [];
    const bookedSlots = slots.filter(s => !!s.booked_by);
    const unread = suggestions.filter(s => !s.is_read);

    const today = new Date(); today.setHours(0,0,0,0);
    const todaySg = suggestions.filter(s => {
      const d = new Date(s.created_at); d.setHours(0,0,0,0);
      return d.getTime() === today.getTime();
    });

    document.getElementById('statGrid').innerHTML = `
      <div class="stat-card"><div class="stat-icon">💡</div><div class="stat-num">${suggestions.length}</div><div class="stat-label">전체 건의사항</div></div>
      <div class="stat-card"><div class="stat-icon">☀️</div><div class="stat-num">${todaySg.length}</div><div class="stat-label">오늘 건의</div></div>
      <div class="stat-card"><div class="stat-icon">💬</div><div class="stat-num">${bookedSlots.length}</div><div class="stat-label">상담 예약</div></div>
      <div class="stat-card" style="border-color:${unread.length>0?'#e76f51':'var(--border)'}"><div class="stat-icon">📬</div><div class="stat-num" style="color:${unread.length>0?'#e76f51':'var(--primary)'}">${unread.length}</div><div class="stat-label">읽지 않은 건의</div></div>
    `;
    // 유형 분포
    const types = ['학급 규칙','환경 개선','행사/활동','선생님께','기타'];
    const total = suggestions.length || 1;
    document.getElementById('moodBar').innerHTML = types.map(t => {
      const cnt = suggestions.filter(s => s.type === t).length;
      const pct = Math.round(cnt / total * 100);
      return `<div class="mood-row"><span class="mood-name" style="width:70px;font-size:0.8rem">${t}</span><div class="mood-track"><div class="mood-fill" style="width:${pct}%"></div></div><span class="mood-cnt">${cnt}</span></div>`;
    }).join('');
  }
  // ════════════ 플래너 관리 ════════════
const TEACHER_STUDENTS = [
  {num:'10101',name:'곽승민'},{num:'10102',name:'구민기'},{num:'10103',name:'김나경'},
  {num:'10104',name:'김나후'},{num:'10105',name:'김연우'},{num:'10106',name:'김효정A'},
  {num:'10107',name:'백세영'},{num:'10108',name:'심연경'},{num:'10109',name:'양연우'},
  {num:'10110',name:'염서윤'},{num:'10111',name:'이규준'},{num:'10112',name:'이나율'},
  {num:'10113',name:'이선준'},{num:'10114',name:'이연우'},{num:'10115',name:'이예은'},
  {num:'10116',name:'이율리'},{num:'10117',name:'이재후'},{num:'10118',name:'정예현'},
  {num:'10119',name:'조시현'},{num:'10120',name:'주여원'},{num:'10121',name:'최예지'},
  {num:'10122',name:'최주은'},{num:'10123',name:'한윤화'},{num:'10124',name:'허은'}
];

function setPlannerAdminToday() {
  document.getElementById('plannerAdminDate').value = new Date().toISOString().slice(0, 10);
  loadPlannerAdmin();
}

function changePlannerAdminDate(dir) {
  const input = document.getElementById('plannerAdminDate');
  const d = new Date(input.value + 'T00:00:00');
  d.setDate(d.getDate() + dir);
  input.value = d.toISOString().slice(0, 10);
  loadPlannerAdmin();
}

async function loadPlannerAdmin() {
  const dateInput = document.getElementById('plannerAdminDate');
  if (!dateInput.value) {
    dateInput.value = new Date().toISOString().slice(0, 10);
  }
  const date = dateInput.value;
  const el = document.getElementById('plannerAdminList');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> 불러오는 중...</div>';

  const { data, error } = await sb.from('planners')
    .select('*').eq('plan_date', date);

  if (error) { el.innerHTML = '<div class="empty">❗ 불러오지 못했어요</div>'; return; }

  const written = {};
  (data || []).forEach(p => { written[p.student_num] = p; });

  const writtenCount = TEACHER_STUDENTS.filter(s => written[s.num]).length;
  document.getElementById('plannerAdminSummary').textContent =
    `✅ ${writtenCount}명 작성 / ❌ ${TEACHER_STUDENTS.length - writtenCount}명 미작성`;

  el.innerHTML = TEACHER_STUDENTS.map(s => {
    const p = written[s.num];
    const hasWritten = !!p;
    const pct = hasWritten ? (p.achievement || 0) : 0;
    const barColor = pct >= 75 ? '#52b788' : pct >= 50 ? '#f4a261' : pct >= 25 ? '#ffd166' : '#e0e0e0';
    const updatedAt = hasWritten && p.updated_at
      ? new Date(p.updated_at).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
      : '';

    return `<div class="planner-admin-row ${hasWritten ? 'has-planner' : ''}" onclick="this.classList.toggle('open')">
      <div class="par-top">
        <span class="par-name">${s.name}</span>
        ${hasWritten
          ? `<span class="par-status-ok">✅ 작성</span>`
          : `<span class="par-status-no">❌ 미작성</span>`}
        <div class="par-bar-wrap">
          <div class="par-bar-fill" style="width:${pct}%;background:${barColor}"></div>
        </div>
        <span class="par-pct">${hasWritten ? pct + '%' : '—'}</span>
        ${updatedAt ? `<span class="par-time">${updatedAt}</span>` : ''}
      </div>
      ${hasWritten && p.content
        ? `<div class="par-content">${p.content}</div>`
        : ''}
    </div>`;
  }).join('');
}
</script>
