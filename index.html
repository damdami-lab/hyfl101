<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리 반 아지트</title>
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; text-align: center; background-color: #f0f8ff; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #4a90e2; }
        p { color: #666; }
        .btn { background: #4a90e2; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏠 우리 반 홈페이지에 오신 걸 환영합니다!</h1>
        <p>선생님이 직접 코딩해서 만든 우리들의 공간이에요.</p>
        <br>
        <a href="#" class="btn">오늘의 알림장 확인하기</a>
    </div>
</body>
</html>
